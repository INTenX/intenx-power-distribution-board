# KiBot configuration for JLCPCB fabrication outputs
# Generates gerbers, drill files, BOM, and CPL as artifacts (not checked in)
#
# Usage: kibot -c kibot.yaml -b intenx-power-distribution-board.kicad_pcb

kibot:
  version: 1

global:
  output: '%f-%i.%x'

filters:
  - name: only_jlc_parts
    comment: 'Only parts with LCSC code'
    type: generic
    include_only:
      - column: 'LCSC'
        regex: '^C\d+'

  - name: exclude_dnp
    comment: 'Exclude DNP components'
    type: generic
    exclude_any:
      - column: 'DNP'
        regex: '.'

variants:
  - name: rotated
    comment: 'Apply JLCPCB rotation corrections'
    type: kibom
    variant: rotated
    pre_transform: _rot_footprint

outputs:
  # ==========================================================================
  # Gerber files - JLCPCB compatible (2-layer board)
  # ==========================================================================
  - name: JLCPCB_gerbers
    comment: 'Gerbers compatible with JLCPCB'
    type: gerber
    dir: jlcpcb
    options:
      exclude_edge_layer: true
      exclude_pads_from_silkscreen: true
      plot_sheet_reference: false
      plot_footprint_refs: true
      plot_footprint_values: false
      force_plot_invisible_refs_vals: false
      tent_vias: true
      use_protel_extensions: true
      create_gerber_job_file: false
      disable_aperture_macros: true
      gerber_precision: 4.6
      use_gerber_x2_attributes: false
      use_gerber_net_attributes: false
      line_width: 0.1
      subtract_mask_from_silk: true
    layers:
      - F.Cu
      - B.Cu
      - F.Paste
      - B.Paste
      - F.SilkS
      - B.SilkS
      - F.Mask
      - B.Mask
      - Edge.Cuts

  # ==========================================================================
  # Drill files - JLCPCB compatible
  # ==========================================================================
  - name: JLCPCB_drill
    comment: 'Drill files compatible with JLCPCB'
    type: excellon
    dir: jlcpcb
    options:
      pth_and_npth_single_file: false
      pth_id: '-PTH'
      npth_id: '-NPTH'
      metric_units: true
      map: gerber
      route_mode_for_oval_holes: false
      output: '%f%i.%x'

  # ==========================================================================
  # Pick and Place / CPL - JLCPCB format
  # ==========================================================================
  - name: JLCPCB_position
    comment: 'Pick and place file (CPL) for JLCPCB'
    type: position
    dir: jlcpcb
    options:
      variant: rotated
      output: '%f_cpl.%x'
      format: CSV
      units: millimeters
      separate_files_for_front_and_back: false
      only_smd: true
      columns:
        - id: Ref
          name: Designator
        - Val
        - Package
        - id: PosX
          name: 'Mid X'
        - id: PosY
          name: 'Mid Y'
        - id: Rot
          name: Rotation
        - id: Side
          name: Layer

  # ==========================================================================
  # BOM - JLCPCB format with LCSC part numbers
  # ==========================================================================
  - name: JLCPCB_bom
    comment: 'BOM for JLCPCB with LCSC part numbers'
    type: bom
    dir: jlcpcb
    options:
      output: '%f_bom.%x'
      ref_separator: ','
      columns:
        - field: Value
          name: Comment
        - field: References
          name: Designator
        - field: Footprint
          name: Footprint
        - field: 'LCSC'
          name: 'LCSC Part #'
      csv:
        hide_pcb_info: true
        hide_stats_info: true
        quote_all: true

  # ==========================================================================
  # ZIP archive for JLCPCB upload
  # ==========================================================================
  - name: JLCPCB_zip
    comment: 'ZIP file ready for JLCPCB upload'
    type: compress
    dir: jlcpcb
    options:
      output: '%f-jlcpcb.%x'
      files:
        - from_output: JLCPCB_gerbers
          dest: /
        - from_output: JLCPCB_drill
          dest: /
        - from_output: JLCPCB_position
          dest: /
        - from_output: JLCPCB_bom
          dest: /
